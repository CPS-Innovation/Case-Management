parameters:
  - name: environment
    type: string
  - name: functionAppName
    type: string
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: keyVaultName
    type: string
  - name: slotName
    type: string


steps:
  - task: AzureAppServiceSettings@1
    displayName: 'Configure Function App Settings'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      appName: ${{ parameters.functionAppName }}
      resourceGroupName: ${{ parameters.resourceGroupName }}
      slotName: ${{ parameters.slotName }}
      appSettings: |
        [
          {
            "name": "MdsOptions__AccessKey",
            "value": "@Microsoft.KeyVault(VaultName=${{ parameters.keyVaultName }};SecretName=MdsOptions--AccessKey)",
            "slotSetting": false
          },
          {
            "name": "TenantId",
            "value": "$(TenantId)",
            "slotSetting": false
          },
          {
            "name": "CallingAppValidAudience",
            "value": "$(CallingAppValidAudience)",
            "slotSetting": false
          },
          {
            "name": "MdsOptions__BaseUrl",
            "value": "$(MdsOptionsBaseUrl)",
            "slotSetting": false
          },
          {
            "name": "RedirectUrl__CaseworkApp",
            "value": "$(RedirectUrlCaseworkApp)",
            "slotSetting": false
          },
          {
            "name": "RedirectUrl__RegisterCaseUi",
            "value": "$(RedirectUrlRegisterCaseUi)",
            "slotSetting": false
          },
          {
            "name": "FUNCTIONS_WORKER_RUNTIME",
            "value": "dotnet-isolated",
            "slotSetting": false
          },
          {
            "name": "DOTNET_FRAMEWORK_VERSION",
            "value": "v8.0",
            "slotSetting": false
          },
          {
            "name": "WEBSITE_USE_PLACEHOLDER_DOTNETISOLATED",
            "value": "1",
            "slotSetting": false
          }
        ]