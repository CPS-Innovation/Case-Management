trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/ui-spa/*

pr: none

variables:
  - group: cmrc-deployment-global

stages:
  - template: ../templates/ui-build-and-deploy-stages.yml
    parameters:
      environment: 'dev'
      requireValidation: false

  - template: ../templates/ui-build-and-deploy-stages.yml
    parameters:
      environment: 'staging'
      requireValidation: true
      notifyUsers: $(notifyUsers)
      approvers: $(approvers)
      deployToSlot: true
      slotName: 'stg'
      
