trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/ui-spa/*

pr: none

variables:
  - group: cmrc-deployment-global

stages:
  - template: ../templates/ui-build-and-deploy-stages.yml
    parameters:
      environment: 'dev'
      requireValidation: false

  - template: ../templates/ui-build-and-deploy-stages.yml
    parameters:
      environment: 'staging'
      requireValidation: true
      notifyUsers: $(preprodNotifyUsers)
      approvers: $(preprodApprovers)
      deployToSlot: true
      slotName: 'stg'
      
  - template: ../templates/ui-build-and-deploy-stages.yml
    parameters:
      environment: 'prod'
      agentPool: 'CMRC Prod Pool'
      requireValidation: true
      notifyUsers: $(prodNotifyUsers)
      approvers: $(prodApprovers)
      azureSubscription: 'Azure Pipeline: CMRC - Prod'
      deployToSlot: true
      slotName: 'stg'
